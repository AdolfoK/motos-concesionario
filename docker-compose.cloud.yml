# Orquestacion para la nube (se ejecuta en la instancia EC2 de AWS).
# A diferencia de docker-compose.yml, aqui NO hay PostgreSQL local:
# la base de datos es Azure Database for PostgreSQL y las imagenes van a
# Azure Blob Storage. Todos los valores se leen del archivo .env del servidor.

services:
  backend:
    build: ./backend
    container_name: concesionaria-backend
    restart: unless-stopped
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      # --- Azure Database for PostgreSQL ---
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_SSLMODE: require
      # --- Azure Blob Storage (imagenes de motos) ---
      AZURE_STORAGE_ACCOUNT: ${AZURE_STORAGE_ACCOUNT}
      AZURE_STORAGE_KEY: ${AZURE_STORAGE_KEY}
      AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER}
      # --- Negocio ---
      WHATSAPP_NUMERO: ${WHATSAPP_NUMERO}
      DJANGO_ADMIN_USER: ${DJANGO_ADMIN_USER}
      DJANGO_ADMIN_PASSWORD: ${DJANGO_ADMIN_PASSWORD}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    container_name: concesionaria-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
